<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Face AI System</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #0f172a;
    color: white;
}

.container {
    margin-top: 40px;
}

.box {
    background: #1e293b;
    padding: 20px;
    margin: 20px auto;
    width: 320px;
    border-radius: 10px;
}

button {
    padding: 10px;
    margin-top: 10px;
    width: 100%;
    border: none;
    border-radius: 5px;
    background: #3b82f6;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

input {
    padding: 8px;
    width: 100%;
    margin-top: 10px;
}

.result {
    margin-top: 10px;
    font-size: 18px;
    color: #22c55e;
}

.preview {
    margin-top: 10px;
    max-width: 100%;
    border-radius: 8px;
}
</style>

</head>

<body>

<h1>Face Recognition System</h1>

<div class="container">

    <!-- REGISTER -->
    <div class="box">
        <h3>Đăng ký khuôn mặt</h3>

        <input id="name" placeholder="Nhập tên">
        <input type="file" id="file_reg" accept="image/*" onchange="preview(this, 'img_reg')">

        <img id="img_reg" class="preview">

        <button onclick="register()">Đăng ký</button>

        <div id="reg_result" class="result"></div>
    </div>

    <!-- RECOGNIZE -->
    <div class="box">
        <h3>Test nhận diện</h3>

        <input type="file" id="file_rec" accept="image/*" onchange="preview(this, 'img_rec')">

        <img id="img_rec" class="preview">

        <button onclick="recognize()">Nhận diện</button>

        <div id="rec_result" class="result"></div>
    </div>

</div>

<script>

// ===== THAY URL BACKEND =====
const API = "https://your-api.onrender.com";

// ===== PREVIEW IMAGE =====
function preview(input, id) {
    const file = input.files[0];
    if (file) {
        document.getElementById(id).src = URL.createObjectURL(file);
    }
}

// ================= REGISTER =================
async function register() {

    let file = document.getElementById("file_reg").files[0];
    let name = document.getElementById("name").value;

    if (!file || !name) {
        alert("Nhập tên và chọn ảnh");
        return;
    }

    let fd = new FormData();
    fd.append("file", file);
    fd.append("name", name);

    document.getElementById("reg_result").innerText = "Đang xử lý...";

    try {

        let res = await fetch(API + "/register", {
            method: "POST",
            body: fd
        });

        let txt = await res.text();

        document.getElementById("reg_result").innerText = txt;

    } catch (e) {
        document.getElementById("reg_result").innerText = "Lỗi kết nối server";
    }
}

// ================= RECOGNIZE =================
async function recognize() {

    let file = document.getElementById("file_rec").files[0];

    if (!file) {
        alert("Chọn ảnh");
        return;
    }

    let fd = new FormData();
    fd.append("file", file);

    document.getElementById("rec_result").innerText = "Đang nhận diện...";

    try {

        let res = await fetch(API + "/recognize_image", {
            method: "POST",
            body: fd
        });

        let data = await res.json();

        document.getElementById("rec_result").innerText = "Kết quả: " + data.name;

    } catch (e) {
        document.getElementById("rec_result").innerText = "Lỗi hệ thống";
    }
}

</script>

</body>
</html>
